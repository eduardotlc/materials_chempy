  "PTH204",
  "PTH205",
  "PTH206",
  "PTH207",
  "PTH208",
  "PTH210",
  "PTH211",
]
preview = true
task-tags = ["TODO", "HACK", "CHECK", "FIX", "FIXME", "XXX", "DEBUG", "OPTMIZE", "OPT" ]
typing-extensions = true
fixable = ["ALL"]

[tool.ruff.lint.flake8-import-conventions.aliases]
altair = "alt"
"matplotlib.pyplot" = "plt"
numpy = "np"
pandas = "pd"
seaborn = "sns"
scipy = "sp"

[tool.ruff.lint.flake8-pytest-style]
fixture-parentheses = false
mark-parentheses = false

[tool.ruff.lint.flake8-quotes]
avoid-escape = true
docstring-quotes = "double"
inline-quotes = "double"
multiline-quotes = "double"

[tool.ruff.lint.pydocstyle]
convention = "numpy"

[tool.pytest.ini_options]
addopts = [
  "-ra",
  "--color=yes",
  "--code-highlight=yes",
  "--doctest-modules",
  "--doctest-continue-on-failure",
  "--benchmark-sort=mean",
  "--benchmark-columns=mean,stddev,min,max",
]
testpaths = [
  "src/materials_chempy/test_cli.py",
  "src/materials_chempy/spectrophotometry/utils.py",
  "src/materials_chempy/logger.py",
	"src/materials_chempy/utils.py",
  "src/materials_chempy/mass_spectrometry/treat.py",
  "src/materials_chempy/var_handler.py",
  "src/materials_chempy/test_utils.py",
]
