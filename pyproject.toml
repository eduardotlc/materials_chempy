[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "materials_chempy"
version = "0.1.0"
description = "Terminal tools and utils on inorganic chemistry & materials science data handling."
readme = "README.md"
#readme = {file = "README.txt", content-type = "text/x-rst"}
requires-python = ">=3.11"
license = "MIT"
license-files = ["LICENSE"]
authors = [
  { name = "Eduardo Toledo Campos", email = "eduardotcampos@hotmail.com" },
  { name = "Lua Victória Coelho", email = "luavictoriacoelho@gmail.com" },
]
keywords = [
  "science",
  "chemistry",
  "plotting",
  "inorganic",
  "cli",
  "terminal",
  "chromatography",
  "spectroscopy",
  "spectrometry",
  "spectrophotometry",
  "mass spectrometry",
  "uv-vis",
  "fluorescence",
  "fluorescence absorption",
]
classifiers = [
  "Environment :: Console",
  "Development Status :: 2 - Pre-Alpha",
  "Framework :: Jupyter :: JupyterLab",
  "Framework :: Jupyter",
  "Framework :: Matplotlib",
  "Framework :: Pytest",
  "Framework :: Sphinx",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python",
  "Topic :: Database",
  "Topic :: Scientific/Engineering :: Chemistry",
  "Topic :: Scientific/Engineering :: Bio-Informatics",
  "Topic :: Scientific/Engineering :: Image Processing",
  "Topic :: Scientific/Engineering :: Image Recognition",
  "Topic :: Scientific/Engineering :: Visualization",
]
dependencies = [
  "matplotlib",
  "numpy",
  "pandas",
  "astropy",
  "specutils",
  "scipy",
  "pybliometrics",
  "pyopenms",
  "spectrum_overload",
  "metapub",
  "pybliometrics",
  "unidecode",
  "coloredlogs",
  "astropy",
  "specutils",
  "lxml",
  "pytrends",
  "astropy",
  "distinctipy",
  "typer",
]

[project.urls]
Repository = "https://github.com/eduardotlc/materials_chempy"

[project.optional-dependencies]
dev = [
  "docutils",
  "sphinx-design",
  "ruff",
  "sphinx-autodoc-typehints",
  "sphinx-togglebutton",
  "sphinx-remove-toctrees",
  "sphinx-copybutton",
  "numpydoc",
  "nbsphinx",
  "sphinx",
  "reno",
  "flake8",
  "pytest",
  "pygments-pytest",
  "coverage",
  "qiskit_sphinx_theme",
  "sphinx-reredirects",
  "kitcat",
  "jupyterlab",
]

[project.scripts]
materials_chempy = "materials_chempy.cli:app"

[tool.ruff]
line-length = 100
target-version = "py314"
exclude = [".bzr", ".direnv", ".eggs", ".git", ".git-rewrite", ".hg", ".mypy_cache", ".nox", ".pants.d", ".pytype", ".ruff_cache", ".svn", ".tox", ".venv", "__pypackages__", "_build", "buck-out", "dist", "node_modules", "venv", "docs", "tmp"]
fix = true
indent-width = 4
src = ["src", "tests"]
requires-python = ">=3.11"
output-format = "full"
preview = true
unsafe-fixes = true

[tool.ruff.analyze]
detect-string-imports = true
preview = true

[tool.ruff.format]
docstring-code-format = true
docstring-code-line-length = "dynamic"
indent-style = "space"
line-ending = "auto"
preview = true
quote-style = "double"
skip-magic-trailing-comma = false

[tool.ruff.lint]
future-annotations = true
extend-select = [
